model:
  ts_arch: patchtst
  ts_emb_dim: 320
  language_arch: bioclinicalbert
  lang_emb_dim: 768
  decoder_arch: bart
  head_arch: mlp
  projection_dim: 128
  temperature: 0.07
  caption_loss_weight: 1.0
  contrastive_loss_weight: 1.0
  # ── PatchTST architecture ──────────────────────────────────────
  # context_length=5000: full 10-second ECG at 500 Hz (no truncation)
  # patch_length=40:     80 ms per patch — captures a full QRS complex
  # patch_stride=20:     50% overlap → 249 patches/lead × 12 leads = 2988 tokens
  # d_model=256:         transformer hidden dim
  # num_layers=6:        deeper than default (4) — MIMIC is large enough
  # num_heads=8:         8 attention heads (256/8 = 32 dim per head)
  # ffn_dim=1024:        4× d_model feed-forward expansion
  patchtst_context_length: 5000
  patchtst_patch_length: 40
  patchtst_patch_stride: 20
  patchtst_d_model: 256
  patchtst_num_layers: 6
  patchtst_num_heads: 8
  patchtst_ffn_dim: 1024
  patchtst_dropout: 0.1

paths:
  ts_pre_train: null
  patchtst_pretrained_name: null
  language_model: emilyalsentzer/Bio_ClinicalBERT
  decoder_model: null
  decoder_tokenizer: null
  checkpoint_dir: checkpoints

data:
  dataset: mimic
  root: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project
  sampling_rate: 500
  text_source: report
  text_max_length: 128
  dual_tokenizer: true
  return_labels: false
  normalize_mode: global
  mimic_notes_root: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project/mimic_notes
  mimic_demographics_dir: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project/demographics
  mimic_max_samples: null

training:
  batch_size: 48
  epochs: 30
  learning_rate: 2.0e-4
  weight_decay: 5.0e-4
  seed: 42
  num_workers: 8
  lr_scheduler: cosine
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  freeze_language: true
  unfreeze_language_layers: 2
  grad_clip_norm: 1.0
  save_optimizer_state: false
  skip_test: false
  run_name: null
