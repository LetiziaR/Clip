model:
  ts_arch: ts2vec
  ts_emb_dim: 320
  language_arch: bioclinicalbert
  lang_emb_dim: 768
  decoder_arch: bart
  head_arch: mlp
  projection_dim: 128
  temperature: 0.07
  caption_loss_weight: 1.0
  contrastive_loss_weight: 1.0

paths:
  ts_pre_train: ts2vec_pretrained.pt
  patchtst_pretrained_name: null
  language_model: emilyalsentzer/Bio_ClinicalBERT
  decoder_model: null
  decoder_tokenizer: null
  checkpoint_dir: checkpoints

data:
  dataset: mimic
  root: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project
  sampling_rate: 500
  text_source: report
  text_max_length: 128
  dual_tokenizer: true
  return_labels: true
  normalize_mode: global
  mimic_notes_root: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project/mimic_notes
  mimic_demographics_dir: /dss/mcmlscratch/0F/ra59ver2/mimic_ecg_project/demographics
  mimic_max_samples: null
  mimic_labels_file: mimic_ecg_labels.csv

training:
  batch_size: 48
  epochs: 30
  learning_rate: 2.0e-4
  weight_decay: 1.0e-4
  seed: 42
  num_workers: 8
  lr_scheduler: cosine
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  freeze_language: true
  unfreeze_language_layers: 2
  grad_clip_norm: 1.0
  save_optimizer_state: true
  skip_test: false
  run_name: null
