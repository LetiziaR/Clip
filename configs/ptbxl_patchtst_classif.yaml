model:
  ts_arch: patchtst
  ts_emb_dim: 320
  language_arch: bioclinicalbert
  lang_emb_dim: 768
  decoder_arch: bart
  head_arch: mlp
  projection_dim: 128
  temperature: 0.07
  caption_loss_weight: 1.0
  contrastive_loss_weight: 1.0
  patchtst_context_length: 5000
  patchtst_patch_length: 40
  patchtst_patch_stride: 20
  patchtst_d_model: 256
  patchtst_num_layers: 6
  patchtst_num_heads: 8
  patchtst_ffn_dim: 1024
  patchtst_dropout: 0.1

paths:
  ts_pre_train: null
  patchtst_pretrained_name: null
  language_model: emilyalsentzer/Bio_ClinicalBERT
  decoder_model: null
  decoder_tokenizer: null
  checkpoint_dir: checkpoints

data:
  root: /dss/dssmcmlfs01/pr74ze/pr74ze-dss-0001/ra59ver2/ptb-xl-project/files/ptb-xl/1.0.3
  sampling_rate: 500
  text_source: report
  text_max_length: 128
  dual_tokenizer: true
  return_labels: true
  label_col: scp_codes
  label_threshold: 0.0
  normalize_mode: global

training:
  batch_size: 32
  epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  seed: 42
  num_workers: 4
  lr_scheduler: cosine
  early_stopping_patience: 7
  early_stopping_min_delta: 0.001
  freeze_language: true
  unfreeze_language_layers: 2
  grad_clip_norm: 1.0
  save_optimizer_state: false
  skip_test: false
  run_name: null
